<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f5f7fb;
}

h1 {
    color: navy;
    margin-bottom: 24px;
}

.pricing-container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: stretch;
}

.card {
    flex: 1 1 250px;
    border: 1px solid #d1d7e0;
    border-radius: 12px;
    background: #ffffff;
    padding: 24px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    min-height: 320px;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 18px 40px rgba(30, 40, 80, 0.12);
}

.card h2 {
    margin-top: 0;
    margin-bottom: 12px;
    font-size: 1.3rem;
}

.card .price {
    font-size: 2rem;
    font-weight: 700;
    margin: 0 0 16px;
}

.card ul {
    padding-left: 20px;
    margin: 0 0 20px;
}

.card ul li {
    margin-bottom: 10px;
}

.card button {
    border: none;
    background: #1a73e8;
    color: #fff;
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
}

.card button:hover {
    background: #1558c1;
}
</style>
</head>
<body>

<h1>Pricing Plans</h1>
<div class="pricing-container">
    <div class="card">
        <div>
            <h2>Starter</h2>
            <p class="price">$12<span style="font-size:0.8rem;font-weight:400;">/mo</span></p>
            <ul>
                <li>1 project</li>
                <li>Basic support</li>
                <li>50 GB storage</li>
            </ul>
        </div>
        <button>Select plan</button>
    </div>

    <div class="card">
        <div>
            <h2>Professional</h2>
            <p class="price">$29<span style="font-size:0.8rem;font-weight:400;">/mo</span></p>
            <ul>
                <li>5 projects</li>
                <li>Priority support</li>
                <li>200 GB storage</li>
            </ul>
        </div>
        <button>Select plan</button>
    </div>

    <div class="card">
        <div>
            <h2>Enterprise</h2>
            <p class="price">$59<span style="font-size:0.8rem;font-weight:400;">/mo</span></p>
            <ul>
                <li>Unlimited projects</li>
                <li>24/7 premium support</li>
                <li>1 TB storage</li>
            </ul>
        </div>
        <button>Select plan</button>
    </div>
</div>

</body>
</html>
